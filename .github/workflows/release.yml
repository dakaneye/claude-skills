name: Release

on:
  push:
    tags:
      # Match tags like review-code/v1.0.5
      - '*/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need full history + write access to push version bump commit
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Validate tag format: skill-name/vX.Y.Z
          if [[ ! "$TAG" =~ ^[a-zA-Z0-9_-]+/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag does not match expected format (<skill>/v<semver>): $TAG" >&2
            exit 1
          fi

          SKILL_NAME="${TAG%%/v*}"
          VERSION="${TAG#*/v}"
          SKILL_DIR="skills/${SKILL_NAME}"

          if [[ ! -d "$SKILL_DIR" ]]; then
            echo "Error: Skill directory not found: $SKILL_DIR" >&2
            exit 1
          fi

          echo "skill_name=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skill_dir=$SKILL_DIR" >> "$GITHUB_OUTPUT"
          echo "Publishing $SKILL_NAME v$VERSION from $SKILL_DIR"

      - name: Update version in prpm.json
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd "$SKILL_DIR"
          jq --arg v "$VERSION" '.version = $v' prpm.json > prpm.json.tmp
          mv prpm.json.tmp prpm.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Install PRPM
        run: npm install -g prpm@2.1.35

      - name: Configure PRPM authentication
        env:
          PRPM_TOKEN: ${{ secrets.PRPM_TOKEN }}
        run: |
          jq -n --arg token "$PRPM_TOKEN" \
            '{"registryUrl": "https://registry.prpm.dev", "token": $token}' > ~/.prpmrc
          chmod 600 ~/.prpmrc

      - name: Validate package
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
        run: cd "$SKILL_DIR" && prpm publish --dry-run

      - name: Publish to PRPM
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
        run: cd "$SKILL_DIR" && prpm publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: "${{ steps.tag.outputs.skill_name }} v${{ steps.tag.outputs.version }}"
          generate_release_notes: true

      - name: Commit version bump to main via API
        # Uses the GitHub API to create the commit, which GitHub automatically
        # signs — satisfying the required_signatures branch protection rule.
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
          SKILL_NAME: ${{ steps.tag.outputs.skill_name }}
          VERSION: ${{ steps.tag.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE_PATH="$SKILL_DIR/prpm.json"
          CONTENT_B64=$(base64 -w0 "$FILE_PATH")
          MAIN_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')

          # Get the tree of the current main commit
          TREE_SHA=$(gh api repos/${{ github.repository }}/git/commits/"$MAIN_SHA" --jq '.tree.sha')

          # Get the current blob SHA for the file on main
          OLD_BLOB_SHA=$(gh api "repos/${{ github.repository }}/contents/$FILE_PATH?ref=main" --jq '.sha' 2>/dev/null || echo "")

          # Create a new blob with the updated file content
          NEW_BLOB_SHA=$(gh api repos/${{ github.repository }}/git/blobs \
            --method POST \
            --field encoding=base64 \
            --field content="$CONTENT_B64" \
            --jq '.sha')

          # Create a new tree with the updated file
          NEW_TREE_SHA=$(gh api repos/${{ github.repository }}/git/trees \
            --method POST \
            --field base_tree="$TREE_SHA" \
            --input - <<TREEOF | jq -r '.sha'
          {
            "tree": [{
              "path": "$FILE_PATH",
              "mode": "100644",
              "type": "blob",
              "sha": "$NEW_BLOB_SHA"
            }]
          }
          TREEOF
          )

          # Create a signed commit via the API
          NEW_COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
            --method POST \
            --field message="chore($SKILL_NAME): bump version to $VERSION" \
            --field tree="$NEW_TREE_SHA" \
            --field "parents[]=$MAIN_SHA" \
            --jq '.sha')

          # Update main to point to the new commit
          gh api repos/${{ github.repository }}/git/refs/heads/main \
            --method PATCH \
            --field sha="$NEW_COMMIT_SHA" \
            --field force=false

          echo "Version bump committed: $NEW_COMMIT_SHA"
