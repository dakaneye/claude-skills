name: Release

on:
  push:
    tags:
      # Match tags like review-code/v1.0.5
      - '*/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Validate tag format: skill-name/vX.Y.Z
          if [[ ! "$TAG" =~ ^[a-zA-Z0-9_-]+/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag does not match expected format (<skill>/v<semver>): $TAG" >&2
            exit 1
          fi

          SKILL_NAME="${TAG%%/v*}"
          VERSION="${TAG#*/v}"
          SKILL_DIR="skills/${SKILL_NAME}"

          if [[ ! -d "$SKILL_DIR" ]]; then
            echo "Error: Skill directory not found: $SKILL_DIR" >&2
            exit 1
          fi

          echo "skill_name=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skill_dir=$SKILL_DIR" >> "$GITHUB_OUTPUT"
          echo "Publishing $SKILL_NAME v$VERSION from $SKILL_DIR"

      - name: Update version in prpm.json
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd "$SKILL_DIR"
          jq --arg v "$VERSION" '.version = $v' prpm.json > prpm.json.tmp
          mv prpm.json.tmp prpm.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Install PRPM
        run: npm install -g prpm@2.1.35

      - name: Configure PRPM authentication
        env:
          PRPM_TOKEN: ${{ secrets.PRPM_TOKEN }}
        run: |
          jq -n --arg token "$PRPM_TOKEN" \
            '{"registryUrl": "https://registry.prpm.dev", "token": $token}' > ~/.prpmrc
          chmod 600 ~/.prpmrc

      - name: Validate package
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
        run: cd "$SKILL_DIR" && prpm publish --dry-run

      - name: Publish to PRPM
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
        run: cd "$SKILL_DIR" && prpm publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: "${{ steps.tag.outputs.skill_name }} v${{ steps.tag.outputs.version }}"
          generate_release_notes: true

      - name: Create version bump PR
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
          SKILL_NAME: ${{ steps.tag.outputs.skill_name }}
          VERSION: ${{ steps.tag.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-${SKILL_NAME}-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH" origin/main
          git add "$SKILL_DIR/prpm.json"
          git commit -m "chore($SKILL_NAME): bump version to $VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore($SKILL_NAME): bump version to $VERSION" \
            --body "Automated version bump after publishing $SKILL_NAME v$VERSION to PRPM." \
            --base main \
            --head "$BRANCH"

          # Enable auto-merge (squash) so it merges once CI passes
          PR_NUM=$(gh pr view "$BRANCH" --json number --jq '.number')
          gh pr merge "$PR_NUM" --squash --auto
