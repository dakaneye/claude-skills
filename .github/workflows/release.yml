name: Release

on:
  push:
    tags:
      # Match tags like review-code/v1.0.5
      - '*/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Validate tag format: skill-name/vX.Y.Z
          if [[ ! "$TAG" =~ ^[a-zA-Z0-9_-]+/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag does not match expected format (<skill>/v<semver>): $TAG" >&2
            exit 1
          fi

          SKILL_NAME="${TAG%%/v*}"
          VERSION="${TAG#*/v}"
          SKILL_DIR="skills/${SKILL_NAME}"

          if [[ ! -d "$SKILL_DIR" ]]; then
            echo "Error: Skill directory not found: $SKILL_DIR" >&2
            exit 1
          fi

          echo "skill_name=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skill_dir=$SKILL_DIR" >> "$GITHUB_OUTPUT"
          echo "Publishing $SKILL_NAME v$VERSION from $SKILL_DIR"

      - name: Update version in prpm.json
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd "$SKILL_DIR"
          jq --arg v "$VERSION" '.version = $v' prpm.json > prpm.json.tmp
          mv prpm.json.tmp prpm.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Install PRPM
        run: npm install -g prpm@2.1.35

      - name: Configure PRPM authentication
        env:
          PRPM_TOKEN: ${{ secrets.PRPM_TOKEN }}
        run: |
          jq -n --arg token "$PRPM_TOKEN" \
            '{"registryUrl": "https://registry.prpm.dev", "token": $token}' > ~/.prpmrc
          chmod 600 ~/.prpmrc

      - name: Validate package
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
        run: cd "$SKILL_DIR" && prpm publish --dry-run

      - name: Publish to PRPM
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
        run: |
          cd "$SKILL_DIR"
          output=$(prpm publish 2>&1) && exit 0
          if echo "$output" | grep -q "Version already exists"; then
            echo "Version already published — skipping (idempotent)"
          else
            echo "$output" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: dakaneye/hookshot/release-pilot@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          args: "--tag ${{ steps.tag.outputs.skill_name }}/v${{ steps.tag.outputs.version }}"

      - name: Create version bump PR
        env:
          SKILL_DIR: ${{ steps.tag.outputs.skill_dir }}
          SKILL_NAME: ${{ steps.tag.outputs.skill_name }}
          VERSION: ${{ steps.tag.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="chore/bump-${SKILL_NAME}-v${VERSION}"
          FILE_PATH="$SKILL_DIR/prpm.json"

          # Create branch via API
          MAIN_SHA=$(gh api "repos/$REPO/git/ref/heads/main" --jq '.object.sha')
          gh api "repos/$REPO/git/refs" --method POST \
            --field ref="refs/heads/$BRANCH" \
            --field sha="$MAIN_SHA"

          # Create signed commit via API (GitHub signs API-created commits)
          CONTENT_B64=$(base64 -w0 "$FILE_PATH")
          NEW_BLOB=$(gh api "repos/$REPO/git/blobs" --method POST \
            --field encoding=base64 --field content="$CONTENT_B64" --jq '.sha')
          TREE_SHA=$(gh api "repos/$REPO/git/commits/$MAIN_SHA" --jq '.tree.sha')
          NEW_TREE=$(gh api "repos/$REPO/git/trees" --method POST \
            --input - <<TREEOF | jq -r '.sha'
          {"base_tree":"$TREE_SHA","tree":[{"path":"$FILE_PATH","mode":"100644","type":"blob","sha":"$NEW_BLOB"}]}
          TREEOF
          )
          NEW_COMMIT=$(gh api "repos/$REPO/git/commits" --method POST \
            --field message="chore($SKILL_NAME): bump version to $VERSION" \
            --field tree="$NEW_TREE" --field "parents[]=$MAIN_SHA" --jq '.sha')
          gh api "repos/$REPO/git/refs/heads/$BRANCH" --method PATCH \
            --field sha="$NEW_COMMIT"

          # Run validation inline (GITHUB_TOKEN events don't trigger workflows)
          for manifest in skills/*/prpm.json; do
            jq empty "$manifest" || { echo "Invalid JSON: $manifest" >&2; exit 1; }
          done
          for skill_dir in skills/*/; do
            [[ -f "${skill_dir}SKILL.md" ]] || { echo "Missing SKILL.md in $skill_dir" >&2; exit 1; }
          done

          # Report validate status check on the signed commit
          gh api "repos/$REPO/statuses/$NEW_COMMIT" --method POST \
            --field state=success --field context=validate \
            --field description="Validated in release workflow"

          # Create PR and enable auto-merge
          gh pr create --title "chore($SKILL_NAME): bump version to $VERSION" \
            --body "Automated version bump after publishing $SKILL_NAME v$VERSION to PRPM." \
            --base main --head "$BRANCH"
          PR_NUM=$(gh pr view "$BRANCH" --json number --jq '.number')
          gh pr merge "$PR_NUM" --squash --auto
