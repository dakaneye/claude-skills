name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate prpm.json
        run: |
          if [ ! -f prpm.json ]; then
            echo "Error: prpm.json not found"
            exit 1
          fi
          jq empty prpm.json || { echo "Error: prpm.json is not valid JSON"; exit 1; }
          echo "prpm.json is valid"

      - name: Check required files exist
        run: |
          required_files=(
            "skills/review-code/SKILL.md"
            "README.md"
            "LICENSE"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: Required file missing: $file"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Validate scripts are executable
        run: |
          for script in scripts/*.sh; do
            if [ ! -x "$script" ]; then
              echo "Error: $script is not executable"
              exit 1
            fi
          done
          echo "All scripts are executable"

      - name: Count package files
        run: |
          echo "Package contents:"
          echo "- Skills: $(find skills -name '*.md' | wc -l | tr -d ' ')"
          echo "- Agents: $(find agents -name '*.md' | wc -l | tr -d ' ')"
          echo "- Rules: $(find rules -name '*.md' | wc -l | tr -d ' ')"
          echo "- Concepts: $(find concepts -name '*.md' | wc -l | tr -d ' ')"
          echo "- Patterns: $(find patterns -name '*.md' | wc -l | tr -d ' ')"
          echo "- Scripts: $(find scripts -name '*.sh' | wc -l | tr -d ' ')"
          echo "- Total files: $(find . -type f -not -path './.git/*' | wc -l | tr -d ' ')"

  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run skill linter
        run: python3 tests/skill-linter.py

  eval-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate eval files
        run: python3 tests/eval-validator.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ShellCheck
        # TODO: tighten to -S warning after fixing SC2034/SC2155 in existing scripts
        run: shellcheck -x -S error scripts/*.sh

  no-hardcoded-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for machine-specific paths
        run: |
          # Exclude CLAUDE.md which documents the grep command itself
          if grep -r '/Users/' --include='*.md' --include='*.sh' --exclude='CLAUDE.md' .; then
            echo "Error: Found machine-specific /Users/ paths"
            exit 1
          fi
          echo "No hardcoded paths found"
