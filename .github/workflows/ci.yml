name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate prpm.json
        run: |
          if [ ! -f prpm.json ]; then
            echo "Error: prpm.json not found"
            exit 1
          fi
          jq empty prpm.json || { echo "Error: prpm.json is not valid JSON"; exit 1; }
          echo "prpm.json is valid"

      - name: Check required files exist
        run: |
          required_files=(
            "skills/review-code/SKILL.md"
            "README.md"
            "LICENSE"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: Required file missing: $file"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Validate scripts are executable
        run: |
          for script in scripts/*.sh; do
            if [ ! -x "$script" ]; then
              echo "Warning: $script is not executable"
            fi
          done

      - name: Count package files
        run: |
          echo "Package contents:"
          echo "- Skills: $(find skills -name '*.md' | wc -l | tr -d ' ')"
          echo "- Agents: $(find agents -name '*.md' | wc -l | tr -d ' ')"
          echo "- Rules: $(find rules -name '*.md' | wc -l | tr -d ' ')"
          echo "- Concepts: $(find concepts -name '*.md' | wc -l | tr -d ' ')"
          echo "- Patterns: $(find patterns -name '*.md' | wc -l | tr -d ' ')"
          echo "- Scripts: $(find scripts -name '*.sh' | wc -l | tr -d ' ')"
          echo "- Total files: $(find . -type f -not -path './.git/*' | wc -l | tr -d ' ')"
